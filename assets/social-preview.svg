<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e91e63"/>
      <stop offset="100%" stop-color="#ff5c8a"/>
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="8%" r="60%">
      <stop offset="0%" stop-color="#ff2e88" stop-opacity="0.40"/>
      <stop offset="45%" stop-color="#7a1f5c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0c0a16" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="#0c0a16"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- top: logo tile + org -->
  <rect x="80" y="74" width="66" height="66" rx="16" fill="url(#brand)"/>
  <text x="113" y="120" font-family="'SF Mono','Menlo',monospace" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">&gt;_</text>
  <text x="166" y="116" font-size="27" font-weight="600" fill="#c9c4d8" letter-spacing="0.5">vstorm-co</text>

  <!-- title -->
  <text x="80" y="270" font-size="80" font-weight="800" fill="#ffffff" letter-spacing="-1">Pydantic Deep Agents</text>
  <rect x="82" y="292" width="118" height="6" rx="3" fill="url(#brand)"/>

  <!-- tagline (dual positioning) -->
  <text x="80" y="356" font-size="37" font-weight="600" fill="#f4f1fb">Open-source <tspan fill="#ff5c8a">Claude Code</tspan> — that you can also build on.</text>

  <!-- sub -->
  <text x="80" y="404" font-size="25" font-weight="400" fill="#a59fba">A self-hosted terminal AI assistant <tspan fill="#ff5c8a" font-weight="700">+</tspan> the Python framework behind it.</text>

  <!-- feature pills -->
  <g font-size="24" font-weight="600">
    <!-- Live Run Forking (highlighted differentiator) -->
    <rect x="80" y="470" width="232" height="54" rx="27" fill="#ff2e88" fill-opacity="0.16" stroke="#ff5c8a" stroke-opacity="0.9" stroke-width="1.5"/>
    <text x="196" y="505" fill="#ff8fb4" text-anchor="middle">Live Run Forking</text>

    <rect x="328" y="470" width="168" height="54" rx="27" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.5"/>
    <text x="412" y="505" fill="#d8d3e6" text-anchor="middle">Terminal CLI</text>

    <rect x="512" y="470" width="214" height="54" rx="27" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.5"/>
    <text x="619" y="505" fill="#d8d3e6" text-anchor="middle">Python framework</text>

    <rect x="742" y="470" width="146" height="54" rx="27" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.5"/>
    <text x="815" y="505" fill="#d8d3e6" text-anchor="middle">Any model</text>

    <rect x="904" y="470" width="296" height="54" rx="27" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.5"/>
    <text x="1052" y="505" fill="#d8d3e6" text-anchor="middle">MCP · Sandbox · Teams</text>
  </g>

  <!-- footer -->
  <text x="80" y="598" font-family="'SF Mono','Menlo',monospace" font-size="22" fill="#7c7790">github.com/vstorm-co/pydantic-deepagents</text>
  <text x="1200" y="598" font-size="22" fill="#7c7790" text-anchor="end">oss.vstorm.co</text>
</svg>
